name: Hourly Cron Jobs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run cron (awaiting-payment reminders + follow-up emails)
        run: |
          curl -fL -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://chunkzthebrand.com/api/cron
